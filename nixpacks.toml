[phases.setup]
nixPkgs = ["nodejs_22", "python312", "gcc", "ffmpeg", "yt-dlp"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build",
  "python3 -m venv artifacts/api-server/.venv",
  "artifacts/api-server/.venv/bin/pip install --upgrade pip",
  "artifacts/api-server/.venv/bin/pip install pyrogram tgcrypto py-tgcalls"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"

[phases.setup]
nixPkgs = ["nodejs_22", "python312", "gcc", "ffmpeg"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "python3 -m pip install -q --upgrade yt-dlp",
  "node build.mjs",
  "python3 -m venv .venv",
  ".venv/bin/pip install -q --upgrade pip",
  ".venv/bin/pip install -q pyrogram tgcrypto py-tgcalls"
]

[start]
cmd = "node dist/index.mjs"
